name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: python -m pip install jinja2

      - name: Configure (Debug preset)
        run: cmake --preset debug

      - name: Build (Debug)
        run: cmake --build build/debug --config Debug --parallel

      - name: Run smoke tests
        run: ctest --test-dir build/debug -C Debug -L smoke --output-on-failure

      - name: Run integration tests
        run: ctest --test-dir build/debug -C Debug -L integration --output-on-failure
